name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run tests
        id: tests
        run: npm test -- --json --outputFile=jest-results.json
        continue-on-error: true
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: postgres://test:test@localhost:5432/testdb
          JWT_SECRET: ci-test-secret-not-used-in-production
          ARCJET_KEY: placeholder

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY

          if [ -f jest-results.json ]; then
            node -e "
              const r = JSON.parse(require('fs').readFileSync('jest-results.json', 'utf8'));
              const status = r.success ? '✅ Passed' : '❌ Failed';
              const lines = [
                \`**Overall status: \${status}**\`,
                '',
                '| Metric | Count |',
                '|--------|------:|',
                \`| ✅ Tests passed  | \${r.numPassedTests} |\`,
                \`| ❌ Tests failed  | \${r.numFailedTests} |\`,
                \`| ⏭️ Tests skipped | \${r.numPendingTests} |\`,
                \`| 📊 Total tests   | \${r.numTotalTests} |\`,
                \`| 🗂️ Test suites   | \${r.numPassedTestSuites}/\${r.numTotalTestSuites} passed |\`,
              ];
              console.log(lines.join('\n'));
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY

            if [ -f coverage/coverage-summary.json ]; then
              node -e "
                const c = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total;
                const lines = [
                  '| Category   | Coverage |',
                  '|------------|--------:|',
                  \`| Statements | \${c.statements.pct}% |\`,
                  \`| Branches   | \${c.branches.pct}% |\`,
                  \`| Functions  | \${c.functions.pct}% |\`,
                  \`| Lines      | \${c.lines.pct}% |\`,
                ];
                console.log(lines.join('\n'));
              " >> $GITHUB_STEP_SUMMARY
            else
              echo "_Coverage summary not available._" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Test results file not found — the test runner may have crashed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Annotate test failures
        if: steps.tests.outcome == 'failure'
        run: |
          if [ -f jest-results.json ]; then
            node -e "
              const r = JSON.parse(require('fs').readFileSync('jest-results.json', 'utf8'));
              r.testResults.forEach(suite => {
                (suite.assertionResults || [])
                  .filter(t => t.status === 'failed')
                  .forEach(t => {
                    const file = suite.testFilePath.replace(process.cwd() + '/', '');
                    const msg = (t.failureMessages || []).join(' ').replace(/\n/g, ' ').slice(0, 200);
                    console.log(\`::error file=\${file}::FAILED: \${t.fullName} — \${msg}\`);
                  });
              });
            "
          fi
          exit 1
